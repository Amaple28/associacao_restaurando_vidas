<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <link rel="icon" href="" type="svg">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Ready-to-use Tailwind CSS blocks">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.0.2/tailwind.min.css">
    <link rel="stylesheet" href="https://tailblocks.cc">
    <link rel="stylesheet" href="css/style.css">
    <title>Associação Restaurando Vidas</title>
</head>

<body>

    <!-- NAV -->
    <header class="text-gray-700 body-font border-b border-gray-200 fixed w-full z-10 bg-white">
        <div class="container mx-auto flex flex-wrap p-5 flex-col md:flex-row items-center">
            <a class="flex title-font font-medium items-center text-gray-900 mb-4 md:mb-0" href="index.html"
                target="_blank">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round" stroke-width="2" class="w-10 h-10 text-white p-2 bg-yellow-500 rounded-full"
                    viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                </svg>
                <span class="ml-3 text-xl">Associação Restaurando Vidas</span>
            </a>
        </div>
    </header>


    <!-- MAPS -->
    <section class="text-gray-700 body-font relative" id="contato">
        <div class="absolute inset-0 bg-gray-300">
            <iframe width="100%" height="100%" frameborder="0" marginheight="0" marginwidth="0" title="map"
                scrolling="no"
                src="https://maps.google.com/maps?width=100%&amp;height=600&amp;hl=en&amp;ie=UTF8&amp;t=&amp;z=14&amp;iwloc=B&amp;output=embed"
                style="filter: grayscale(1) contrast(1.2) opacity(0.4);">
            </iframe>
        </div>
        <div class="container px-5 py-24 mx-auto flex">
            <div class="lg:w-1/3 md:w-1/2 bg-white rounded-lg p-8 flex flex-col md:ml-auto w-full mt-10 md:mt-0 relative z-9">
                <h2 class="text-gray-900 text-lg mb-1 font-medium title-font">Entre em Contato</h2>
                <p class="leading-relaxed mb-5 text-gray-600">Envie sua mensagem e entraremos em contato o mais breve possível
                    ou entre em contato através do telefone (31) 97144-8396.</p>
                <input
                    class="bg-white rounded border border-gray-400 focus:outline-none focus:border-yellow-500 text-base px-4 py-2 mb-4"
                    placeholder="Nome" type="text">
                <input
                    class="bg-white rounded border border-gray-400 focus:outline-none focus:border-yellow-500 text-base px-4 py-2 mb-4"
                    placeholder="E-mail" type="email">
                <textarea
                    class="bg-white rounded border border-gray-400 focus:outline-none h-32 focus:border-yellow-500 text-base px-4 py-2 mb-4 resize-none"
                    placeholder="Mensagem"></textarea>
                <button
                    class="text-black bg-yellow-400 border-0 py-2 px-6 focus:outline-none hover:bg-yellow-300 rounded text-lg">Enviar</button>
                <p class="text-xs text-gray-500 mt-3">
                    Nós não compartilhamos suas informações com ninguém.
                </p>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="text-gray-700 body-font">
        <div class="bg-gray-200">
            <div class="container mx-auto py-4 px-5 flex flex-wrap flex-col sm:flex-row">
                <p class="text-gray-500 text-sm text-center sm:text-left">Todos os Direitos Reservados © 2023 Tailwind Blocks —
                    <a href="https://amaple28.github.io/portfolio/" class="text-gray-600 ml-1" target="_blank"
                        rel="noopener noreferrer">Maisa Rodrigues</a>
                </p>

                <span class="inline-flex lg:ml-auto lg:mt-0 mt-6 w-full justify-center md:justify-start md:w-auto">
                    <a class="ml-3 text-gray-500" href="https://www.instagram.com/restaurandovidas96" target="_blank">
                        <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="2" class="w-5 h-5" viewBox="0 0 24 24">
                            <rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect>
                            <path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37zm1.5-4.87h.01"></path>
                        </svg>
                    </a>
                </span>
            </div>
        </div>
    </footer>

</body>

</html>
